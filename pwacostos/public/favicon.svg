<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo rojo redondeado -->
  <rect width="100" height="100" rx="22" fill="#c0392b"/>

  <!-- Sombra del tomate -->
  <ellipse cx="50" cy="67" rx="28" ry="6" fill="rgba(0,0,0,0.18)"/>

  <!-- Cuerpo del tomate -->
  <ellipse cx="50" cy="55" rx="30" ry="28" fill="#e74c3c"/>

  <!-- Segmentos del tomate -->
  <line x1="50" y1="30" x2="50" y2="80" stroke="#c0392b" stroke-width="1.5" opacity="0.5"/>
  <line x1="21" y1="55" x2="79" y2="55" stroke="#c0392b" stroke-width="1.5" opacity="0.4"/>

  <!-- Brillo/reflejo -->
  <ellipse cx="38" cy="40" rx="10" ry="7" fill="rgba(255,240,235,0.55)" transform="rotate(-15,38,40)"/>
  <ellipse cx="49" cy="37" rx="4" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-15,49,37)"/>

  <!-- Tallo -->
  <rect x="47" y="18" width="6" height="16" rx="3" fill="#27ae60"/>

  <!-- Hojas del cáliz -->
  <polygon points="50,26 32,22 40,30" fill="#2ecc71"/>
  <polygon points="50,26 68,22 60,30" fill="#27ae60"/>
  <polygon points="50,24 46,10 54,10" fill="#2ecc71"/>
</svg>
