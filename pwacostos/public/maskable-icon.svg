<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo sólido rojo (maskable: cubre todo el cuadrado) -->
  <rect width="512" height="512" fill="#c0392b"/>

  <!-- Contenido centrado en zona segura (80% = 410px, offset 51px) -->
  <!-- Sombra del tomate -->
  <ellipse cx="256" cy="350" rx="144" ry="30" fill="rgba(0,0,0,0.18)"/>

  <!-- Cuerpo del tomate -->
  <ellipse cx="256" cy="280" rx="154" ry="144" fill="#e74c3c"/>

  <!-- Segmentos -->
  <line x1="256" y1="150" x2="256" y2="410" stroke="#c0392b" stroke-width="8" opacity="0.45"/>
  <line x1="110" y1="280" x2="402" y2="280" stroke="#c0392b" stroke-width="8" opacity="0.35"/>

  <!-- Brillo principal -->
  <ellipse cx="196" cy="205" rx="52" ry="36" fill="rgba(255,240,235,0.55)" transform="rotate(-15,196,205)"/>
  <ellipse cx="250" cy="190" rx="20" ry="14" fill="rgba(255,255,255,0.35)" transform="rotate(-15,250,190)"/>

  <!-- Tallo -->
  <rect x="243" y="92" width="30" height="80" rx="15" fill="#27ae60"/>

  <!-- Hojas -->
  <polygon points="256,132 160,110 205,154" fill="#2ecc71"/>
  <polygon points="256,132 352,110 307,154" fill="#27ae60"/>
  <polygon points="256,120 234,52 278,52" fill="#2ecc71"/>
</svg>
