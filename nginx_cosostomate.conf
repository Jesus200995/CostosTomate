server {
    server_name monitoreo.geodatos.com.mx;

    root /var/www/CostosTomate/pwacostos/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # index.html y service worker: NUNCA cachear (siempre pedir al servidor)
    location ~* ^/(index\.html|sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # API -> backend FastAPI
    location /api {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Activos con hash en el nombre (Vite): cachear agresivamente (son inmutables)
    location ~* /assets/.*\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes, fuentes, íconos: cache larga pero revalidable
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/monitoreo.geodatos.com.mx/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/monitoreo.geodatos.com.mx/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = monitoreo.geodatos.com.mx) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name monitoreo.geodatos.com.mx;
    return 404; # managed by Certbot
}
